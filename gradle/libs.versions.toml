[versions]
spring-boot = "4.0.4"
spring-dependency-management = "1.1.7"
kotlin = "2.3.0"
kotlinx-coroutines = "1.10.2"
postgresql = "42.7.7"
flyway = "12.3.0"
flyway-postgres = "12.1.1"
lombok = "1.18.44"
mapstruct = "1.6.3"
avaje-validator = "2.15"
testcontainers = "2.0.4"

[libraries]
# -- Spring Boot starters (managed by Spring Boot BOM) --
spring-boot-starter-web = { module = "org.springframework.boot:spring-boot-starter-web" }
spring-boot-starter-data-jpa = { module = "org.springframework.boot:spring-boot-starter-data-jpa" }
spring-boot-starter-security = { module = "org.springframework.boot:spring-boot-starter-security" }
spring-boot-starter-oauth2-resource-server = { module = "org.springframework.boot:spring-boot-starter-oauth2-resource-server" }
spring-boot-starter-actuator = { module = "org.springframework.boot:spring-boot-starter-actuator" }
spring-boot-starter-test = { module = "org.springframework.boot:spring-boot-starter-test" }

# -- Spring Security test --
spring-security-test = { module = "org.springframework.security:spring-security-test" }

# -- Persistence --
postgresql = { module = "org.postgresql:postgresql", version.ref = "postgresql" }

# -- Flyway --
flyway-core = { module = "org.flywaydb:flyway-core", version.ref = "flyway" }
flyway-database-postgresql = { module = "org.flywaydb:flyway-database-postgresql", version.ref = "flyway-postgres" }

# -- Validation (Avaje) --
avaje-validator-spring-starter = { module = "io.avaje:avaje-validator-spring-starter", version.ref = "avaje-validator" }

# -- Lombok --
lombok = { module = "org.projectlombok:lombok", version.ref = "lombok" }

# -- MapStruct --
mapstruct = { module = "org.mapstruct:mapstruct", version.ref = "mapstruct" }
mapstruct-processor = { module = "org.mapstruct:mapstruct-processor", version.ref = "mapstruct" }

# -- Kotlin runtime --
kotlin-stdlib = { module = "org.jetbrains.kotlin:kotlin-stdlib" }
kotlin-reflect = { module = "org.jetbrains.kotlin:kotlin-reflect", version.ref = "kotlin" }
kotlinx-coroutines-core = { module = "org.jetbrains.kotlinx:kotlinx-coroutines-core", version.ref = "kotlinx-coroutines" }

# -- Testcontainers --
testcontainers-bom = { module = "org.testcontainers:testcontainers-bom", version.ref = "testcontainers" }
testcontainers-postgresql = { module = "org.testcontainers:testcontainers-postgresql", version.ref = "testcontainers" }
testcontainers-junit-jupiter = { module = "org.testcontainers:testcontainers-junit-jupiter", version.ref = "testcontainers" }

[bundles]
spring-web = ["spring-boot-starter-web", "spring-boot-starter-actuator"]
spring-data = ["spring-boot-starter-data-jpa", "postgresql"]
spring-security = ["spring-boot-starter-security", "spring-boot-starter-oauth2-resource-server"]
mapstruct-lombok = ["mapstruct", "mapstruct-processor", "lombok"]
testcontainers = ["testcontainers-bom", "testcontainers-postgresql"]

[plugins]
spring-boot = { id = "org.springframework.boot", version.ref = "spring-boot" }
spring-dependency-management = { id = "io.spring.dependency-management", version.ref = "spring-dependency-management" }
kotlin-jvm = { id = "org.jetbrains.kotlin.jvm", version.ref = "kotlin" }
kotlin-spring = { id = "org.jetbrains.kotlin.plugin.spring", version.ref = "kotlin" }
