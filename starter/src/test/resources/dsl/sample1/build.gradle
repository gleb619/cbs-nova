plugins {
  id 'java'
}

group = 'cbs.nova.dsl.sample1'
version = '1.0.0'

java {
  toolchain {
    languageVersion = JavaLanguageVersion.of(25)
  }
}

repositories {
  mavenCentral()
}

dependencies {
  implementation files('libs/dsl-api.jar')
}

tasks.register('compileDsl', JavaExec) {
  classpath = files('libs/dsl-api.jar', 'libs/dsl-codegen.jar')
  mainClass = 'cbs.dsl.codegen.DslCompiler'
  args '.', 'build/dsl-classes'
  javaLauncher = javaToolchains.launcherFor {
    languageVersion = JavaLanguageVersion.of(25)
  }
}
