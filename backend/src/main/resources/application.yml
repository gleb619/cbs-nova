server:
  port: 7070
  tomcat:
    threads:
      max: 100
      min-spare: 10
    connection-timeout: 20000
    max-connections: 10000
    accept-count: 100

spring:
  application:
    name: cbs-nova
  datasource:
    url: jdbc:postgresql://localhost:5432/cbsnova
    username: cbsnova
    password: cbsnova
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
        generate_statistics: false
        use_sql_comments: false
        format_sql: false
        connection:
          autocommit: false
        cache:
          use_second_level_cache: false
          use_query_cache: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
  sql:
    init:
      mode: never
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: "0"
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          # TODO: Set KEYCLOAK_ISSUER_URI environment variable to your Keycloak realm OIDC issuer URL
          # Example: https://auth.example.com/realms/cbs
          issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9080/realms/cbs}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    cbs: DEBUG

app:
  cbs:
    dsl:
      scripts-dir: examples/cbs-rules
  temporal:
    service-address: 127.0.0.1:7233
    task-queue: WORKFLOW_TASK_QUEUE
  keycloak:
    enabled: false
  local-auth:
    users:
      - username: admin1
        password: admin1
        roles: ADMIN,USER
      - username: user1
        password: user1
        roles: USER